services:
  - type: web
    name: fieldyield-api
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fieldyield-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: fieldyield-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://field-yield.vercel.app

  - type: keyvalue
    name: fieldyield-redis
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Render services
    maxmemoryPolicy: noeviction

databases:
  - name: fieldyield-db
    plan: free
    databaseName: fieldyield
    user: fieldyield
