services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql+psycopg://fieldyield:fieldyield@postgres:5432/fieldyield
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: local-development-secret
    depends_on: [postgres, redis]
  worker:
    build: .
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on: [redis]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: fieldyield
      POSTGRES_PASSWORD: fieldyield
      POSTGRES_DB: fieldyield
    ports: ["5432:5432"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

